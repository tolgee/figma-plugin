name: Test

on:
  push:
    branches: [main, release, rewrite-svelte-v2]
  pull_request:

env:
  PNPM_VERSION: 10
  NODE_VERSION: "20.x"

jobs:
  static-check:
    name: Static check 🪲
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test

  build:
    name: Build 🏗
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  e2e:
    name: E2E (Playwright + Tolgee)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Start Tolgee in the background as early as possible so its slow JVM
      # warm-up overlaps with the rest of the build steps.
      - name: Start Tolgee platform
        run: pnpm run e2e:up

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build plugin
        run: pnpm run build

      - name: Wait for Tolgee
        run: pnpm run e2e:wait

      - name: Run Playwright
        run: pnpm exec playwright test

      - name: Capture Tolgee logs on failure
        if: failure()
        run: docker compose -f e2e/docker-compose.yml logs --no-color > tolgee.log || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/**/*
            e2e/test-results/**/*
            tolgee.log
          retention-days: 7

      - name: Stop Tolgee
        if: always()
        run: docker compose -f e2e/docker-compose.yml down -v
